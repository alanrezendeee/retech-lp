<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Outer dark bg -->
  <rect width="128" height="128" rx="28" fill="#0a0a0a"/>

  <!-- Neon border ring -->
  <rect x="2" y="2" width="124" height="124" rx="27" stroke="#00FF88" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Inner green badge (like navbar logo) -->
  <rect x="20" y="20" width="88" height="88" rx="20" fill="#00FF88"/>

  <!-- Layers / stack icon (same as navbar), centered, in black -->
  <!-- Layer 1: top -->
  <path d="M64 30L32 46l32 16 32-16L64 30z"
        stroke="#0a0a0a" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 2: middle -->
  <path d="M32 64l32 16 32-16"
        stroke="#0a0a0a" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 3: bottom -->
  <path d="M32 80l32 16 32-16"
        stroke="#0a0a0a" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
